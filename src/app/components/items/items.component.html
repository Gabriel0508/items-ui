<app-header></app-header>

<section
  class="container my-4"
  *ngIf="{
    products: products$ | async,
    isLoading: isLoading$ | async
  } as data"
>
  <div>
    <div class="row g-4">
      <div class="col-sm-12 col-md-6 col-lg-3" *ngFor="let product of data.products">
        <app-generic-card
          [id]="product.id"
          [name]="product.name"
          [brand]="product.brand"
          [description]="product.description"
          [price]="product.price"
          (favoriteProduct)="onFavoriteProductAdd(product.id)"
          (cartProduct)="onCartProductAdd(product.id)"
        ></app-generic-card>
      </div>
    </div>
  </div>
</section>
