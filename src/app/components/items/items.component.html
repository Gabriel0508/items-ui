<app-header></app-header>

<section
  class="container my-4"
  *ngIf="{
    products: products$ | async,
    isLoading: isLoading$ | async
  } as data"
>
  <div>
    <div class="row">
      <div class="col-md-6" *ngFor="let product of data.products">
        <mat-card>
          <mat-card-header>
            <span>{{ product.id }}</span>
            <h2>{{ product.brand }}</h2>
          </mat-card-header>
          <mat-card-content>
            <p>{{ product.name }}</p>
            <p>{{ product.description }}</p>
          </mat-card-content>
          <mat-card-footer
            class="d-flex justify-content-between align-items-cente px-2"
          >
            <p>Price: {{ product.price }} $</p>

            <div>
              <button mat-raised-button class="me-1">
                <mat-icon>shopping_cart</mat-icon>
              </button>
              <button mat-raised-button color="accent" class="ms-1">
                <mat-icon>favorite</mat-icon>
              </button>
            </div>
          </mat-card-footer>
        </mat-card>
      </div>
    </div>
  </div>
</section>
