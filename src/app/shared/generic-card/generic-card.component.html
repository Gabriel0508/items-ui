<mat-card class="product-card shadow d-flex flex-column justify-content-between">
  <mat-card-header class="d-flex justify-content-center">
    <h2>{{ brand }}</h2>
  </mat-card-header>
  <mat-card-content class="d-flex flex-column align-items-center">
    <mat-card-title>{{ name }}</mat-card-title>
    <p>{{ description }}</p>
  </mat-card-content>
  <mat-card-actions class="d-flex justify-content-between">
    <div class="fs-5"><strong>${{ price }}</strong></div>

    <div>
      <button mat-mini-fab color="basic" class="me-1" (click)="onCartAdd()">
        <mat-icon>shopping_cart</mat-icon>
      </button>
      <button mat-mini-fab color="accent" class="ms-1" (click)="onFavoriteAdd()">
        <mat-icon>favorite</mat-icon>
      </button>
    </div>
  </mat-card-actions>
  <mat-card-footer class="footer d-flex justify-content-center fs-5 py-1 bg-danger text-light"> Buy Now </mat-card-footer>
</mat-card>
